name: Feature request
description: Suggest an idea or improvement for Redly
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please remember that Redly
        intentionally aims to stay **minimal and read-only** — features
        that require a Reddit account, posting, voting or moderation are
        out of scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear and concise description of the use case.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you would like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context, mockups or screenshots
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Please confirm this fits Redly's scope.
      options:
        - label: This feature does not require a Reddit account or write access (vote, post, comment, mod actions).
          required: true
        - label: This feature does not collect or transmit user data.
          required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this request, you agree to follow our [Code of Conduct](../blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow the Code of Conduct
          required: true
