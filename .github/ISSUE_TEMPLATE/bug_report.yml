name: Bug report
description: Report a problem with Redly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the
        sections below so we can reproduce and fix the problem quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what you saw...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Redly
        2. Go to '...'
        3. Tap on '...'
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Redly version
      placeholder: e.g. v0.1.0
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: e.g. Android 14
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: e.g. Pixel 7, Samsung S22
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Drag-and-drop screenshots or paste logcat output here.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](../blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow the Code of Conduct
          required: true
